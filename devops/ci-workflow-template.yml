# Pika Sprint 1 CI workflow template
# Intended root destination: `workspace/.github/workflows/ci.yml`
# Source of truth while devops is path-scoped: `workspace/devops/ci-workflow-template.yml`

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify-workspace:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workspace
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: workspace/pnpm-workspace.yaml

      - name: Install monorepo dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify scaffold files exist
        run: |
          test -f package.json
          test -f pnpm-workspace.yaml
          test -f tsconfig.base.json
          test -f apps/frontend/package.json
          test -f apps/backend/package.json
          test -f packages/contracts/package.json

      - name: Run monorepo checks when scripts exist
        run: |
          pnpm -r --if-present lint
          pnpm -r --if-present typecheck
          pnpm -r --if-present test
          pnpm -r --if-present build

  verify-legacy-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workspace/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workspace/backend/package.json

      - name: Install legacy backend dependencies
        run: npm install

      - name: Run legacy backend checks when scripts exist
        run: |
          npm run lint --if-present
          npm run test --if-present