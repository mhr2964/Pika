# Pika Sprint 1 CI workflow template
# Intended destination after platform integration: `workspace/.github/workflows/ci.yml`
# Current source-of-truth path: `workspace/devops/ci-workflow-template.yml`

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify-monorepo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workspace
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: workspace/pnpm-workspace.yaml

      - name: Install monorepo dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify workspace scaffold
        run: |
          test -f package.json
          test -f pnpm-workspace.yaml
          test -f .env.example
          test -f apps/frontend/package.json
          test -f apps/backend/package.json
          test -f packages/contracts/package.json

      - name: Run monorepo checks when scripts exist
        run: |
          pnpm --filter @pika/frontend run lint --if-present
          pnpm --filter @pika/frontend run typecheck --if-present
          pnpm --filter @pika/frontend run test --if-present
          pnpm --filter @pika/frontend run build --if-present
          pnpm --filter @pika/backend run lint --if-present
          pnpm --filter @pika/backend run typecheck --if-present
          pnpm --filter @pika/backend run test --if-present
          pnpm --filter @pika/backend run build --if-present
          pnpm --filter @pika/contracts run lint --if-present
          pnpm --filter @pika/contracts run typecheck --if-present
          pnpm --filter @pika/contracts run test --if-present
          pnpm --filter @pika/contracts run build --if-present

  verify-legacy-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workspace/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workspace/backend/package.json

      - name: Install legacy backend dependencies
        run: npm install

      - name: Verify legacy backend scaffold
        run: |
          test -f package.json
          test -f src/index.js
          test -f src/config/env.js

      - name: Run legacy backend checks when scripts exist
        run: |
          npm run lint --if-present
          npm run test --if-present