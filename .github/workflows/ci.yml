name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: workspace/pnpm-workspace.yaml

      - name: Install dependencies
        working-directory: workspace
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        working-directory: workspace
        run: pnpm lint

      - name: Typecheck
        working-directory: workspace
        run: pnpm typecheck