<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pika Prototype</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Pika</h1>
        <nav>
            <ul>
                <li><a href="#features">Features</a></li>
                <li><a href="#signup">Sign Up</a></li>
                <li><a href="#login">Log In</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="features">
            <h2>Features</h2>
            <p>Explore our amazing features that help you every step of the way.</p>
            <ul>
                <li>Feature 1: User-friendly interface</li>
                <li>Feature 2: Quick onboarding</li>
                <li>Feature 3: Real-time collaboration</li>
            </ul>
        </section>
        <section id="signup">
            <h2>Sign Up</h2>
            <form>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <button type="submit">Create Account</button>
            </form>
        </section>
        <section id="login">
            <h2>Log In</h2>
            <form>
                <label for="usernameLogin">Username:</label>
                <input type="text" id="usernameLogin" name="usernameLogin" required>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <button type="submit">Log In</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Pika. All rights reserved.</p>
    </footer>
</body>
</html>
